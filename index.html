<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portfólio de Eder Queiroz: backend Node.js/NestJS, AWS, Flutter. Sistemas confiáveis e escaláveis — com os cases ilustrados ao vivo." />
    <title>Eder Queiroz — Engenheiro de Software</title>
    <link rel="canonical" href="https://ederqueiroz.dev.br/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ederqueiroz.dev.br/" />
    <meta property="og:title" content="Eder Queiroz — Engenheiro de Software" />
    <meta property="og:description" content="Sistemas confiáveis e escaláveis: Node.js, NestJS, AWS, Flutter — cases ilustrados ao vivo." />
    <meta property="og:image" content="https://ederqueiroz.dev.br/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand mono" href="#top">eder<span class="brand-accent">queiroz</span></a>
      <nav class="site-nav">
        <a href="#about" data-i18n="nav.about"></a>
        <a href="#cases" data-i18n="nav.cases"></a>
        <a href="#experience" data-i18n="nav.experience"></a>
        <a href="#contact" data-i18n="nav.contact"></a>
      </nav>
      <button id="lang-toggle" class="chip" type="button" aria-label="Switch language">
        <span data-i18n="lang.toggle"></span>
      </button>
    </header>
    <main id="top" class="bento-grid">
      <section class="card card--full hero">
        <p class="hero-hello" data-i18n="hero.hello"></p>
        <h1 class="hero-roles mono" aria-live="off"><span id="typing"></span><span class="caret" aria-hidden="true"></span></h1>
        <p class="hero-tagline" data-i18n="hero.tagline"></p>
        <p class="muted" data-i18n="hero.location"></p>
        <a class="btn-primary" href="#contact" data-i18n="hero.cta"></a>
      </section>
      <section id="about" class="card card--span2">
        <h2 data-i18n="about.title"></h2>
        <p data-i18n="about.body"></p>
      </section>
      <section id="skills" class="card card--span2">
        <h2 data-i18n="skills.title"></h2>
        <p class="muted" data-i18n="skills.hint"></p>
        <ul class="skill-list" role="list">
          <li><button class="chip" data-skill="node">Node.js</button></li>
          <li><button class="chip" data-skill="nest">NestJS</button></li>
          <li><button class="chip" data-skill="aws">AWS</button></li>
          <li><button class="chip" data-skill="sqs">SQS</button></li>
          <li><button class="chip" data-skill="flutter">Flutter</button></li>
          <li><button class="chip" data-skill="dart">Dart</button></li>
          <li><button class="chip" data-skill="react">React / Next.js</button></li>
          <li><button class="chip" data-skill="postgres">PostgreSQL</button></li>
        </ul>
      </section>
      <section id="cases" class="card card--full cases-intro">
        <h2 data-i18n="cases.title"></h2>
        <p class="muted" data-i18n="cases.subtitle"></p>
      </section>
      <section id="ledger-case" class="card card--span2">
        <h3 data-i18n="ledger.title"></h3>
        <p data-i18n="ledger.desc"></p>
        <div class="ledger-stage" aria-hidden="true"></div>
        <p class="mono ledger-count" aria-hidden="true"></p>
        <p class="metric" data-i18n="ledger.metric"></p>
      </section>
      <section id="sqs-case" class="card card--span2">
        <h3 data-i18n="sqs.title"></h3>
        <p data-i18n="sqs.desc"></p>
        <div class="sqs-stage" aria-hidden="true">
          <div class="sqs-lane">
            <div class="sqs-box sqs-queue"><span class="sqs-box-label" data-i18n="sqs.queue"></span><div class="sqs-slots"></div></div>
            <div class="sqs-arrow mono">→</div>
            <div class="sqs-box sqs-consumer"><span class="sqs-box-label" data-i18n="sqs.consumer"></span><div class="sqs-processing"></div></div>
          </div>
          <div class="sqs-counters mono">
            <span class="sqs-counter ok">✓ <b class="c-delivered">0</b> <span data-i18n="sqs.delivered"></span></span>
            <span class="sqs-counter warn">↻ <b class="c-retried">0</b> <span data-i18n="sqs.retried"></span></span>
            <span class="sqs-counter danger">☠ <b class="c-dlq">0</b> <span data-i18n="sqs.dlq"></span></span>
          </div>
        </div>
        <p class="metric" data-i18n="sqs.metric"></p>
      </section>
      <section id="ga-case" class="card card--span2">
        <h3 data-i18n="ga.title"></h3>
        <p data-i18n="ga.desc"></p>
        <canvas class="ga-canvas" width="440" height="200" aria-hidden="true"></canvas>
        <div class="ga-bar">
          <span class="mono ga-status" aria-live="polite"></span>
          <button class="chip ga-restart" type="button" data-i18n="ga.restart"></button>
        </div>
      </section>
      <section id="wins" class="card card--span2">
        <h2 data-i18n="wins.title"></h2>
        <ul class="wins-list" role="list">
          <li class="win"><span class="win-medal" aria-hidden="true">🥇</span><div><b data-i18n="wins.hack1"></b> <span class="muted" data-i18n="wins.hack1.desc"></span></div></li>
          <li class="win"><span class="win-medal" aria-hidden="true">🥉</span><div><b data-i18n="wins.hack3"></b> <span class="muted" data-i18n="wins.hack3.desc"></span></div></li>
          <li class="win"><span class="win-medal" aria-hidden="true">🏅</span><div><b data-i18n="wins.honor"></b> <span class="muted" data-i18n="wins.honor.desc"></span></div></li>
        </ul>
      </section>
      <section id="experience" class="card card--full">
        <h2 data-i18n="exp.title"></h2>
        <ol class="timeline" role="list">
          <li class="timeline-item">
            <div class="timeline-head"><b data-i18n="exp.gd.company"></b><span class="mono muted" data-i18n="exp.gd.period"></span></div>
            <p class="timeline-role" data-i18n="exp.gd.role"></p>
            <p class="muted" data-i18n="exp.gd.desc"></p>
          </li>
          <li class="timeline-item">
            <div class="timeline-head"><b data-i18n="exp.bw.company"></b><span class="mono muted" data-i18n="exp.bw.period"></span></div>
            <p class="timeline-role" data-i18n="exp.bw.role"></p>
            <p class="muted" data-i18n="exp.bw.desc"></p>
          </li>
          <li class="timeline-item">
            <div class="timeline-head"><b data-i18n="exp.edu.company"></b><span class="mono muted" data-i18n="exp.edu.period"></span></div>
            <p class="timeline-role" data-i18n="exp.edu.role"></p>
            <p class="muted" data-i18n="exp.edu.desc"></p>
          </li>
        </ol>
      </section>
      <section id="contact" class="card card--full contact">
        <h2 data-i18n="contact.title"></h2>
        <p data-i18n="contact.body"></p>
        <div class="contact-actions">
          <a class="btn-primary" href="mailto:ederjuniodesouzaqueiroz@gmail.com" data-i18n="contact.cta"></a>
          <a class="chip" href="https://www.linkedin.com/in/ederqueirozdev" target="_blank" rel="noopener">LinkedIn</a>
          <a class="chip" href="https://github.com/EderQueiroz" target="_blank" rel="noopener">GitHub</a>
        </div>
      </section>
    </main>
    <footer class="site-footer muted"><p data-i18n="footer.built"></p></footer>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
