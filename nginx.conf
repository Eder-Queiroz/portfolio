server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # assets versionados pelo Vite (hash no nome) → cache longo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # demais rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
